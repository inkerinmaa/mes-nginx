# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name mes.test.local api.test.local;
    return 301 https://$host$request_uri;
}

# HTTPS server — NO redirects here!
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mes.test.local;

    ssl_certificate     /home/nikgl/projects/mes-nginx/ssl/wildcard.test.local.crt;
    ssl_certificate_key /home/nikgl/projects/mes-nginx/ssl/wildcard.test.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Proxy to Docker nginx (mes-frontend container)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Critical: prevent upstream redirects from causing loops
        proxy_redirect off;
        
        proxy_read_timeout 3600s;
        proxy_connect_timeout 3600s;
    }
}
